name: Rating Service CI

on:
  push:
    paths:
      - 'services/rating-service/**'
      - 'common/**'
  pull_request:
    paths:
      - 'services/rating-service/**'
      - 'common/**'

jobs:
  build:
    name: Build & Test Rating Service
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: sportlink
          POSTGRES_PASSWORD: sportlink
          POSTGRES_DB: ratings_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Rating Service
        run: ./gradlew :services:rating-service:build -x test --no-daemon

      - name: Run Rating Service tests
        run: ./gradlew :services:rating-service:test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rating-service-test-results
          path: 'services/rating-service/build/test-results/'

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/rating-service/Dockerfile
          push: false
          tags: rating-service:${{ github.sha }}
