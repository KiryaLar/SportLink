name: CI/CD Pipeline

# Runs on every push/PR to main or develop.
# Per-service CIs (gateway-service-ci.yml etc.) handle isolated service changes.
# This pipeline covers: full build+test → quality gate → Docker push → deploy.
#
# TODO: eliminate double compilation — currently build-and-test re-builds all services
#       that were already built by the per-service CIs on the same commit. Fix by
#       replacing the build-and-test job with individual calls to _service-ci.yml
#       (one per service, using `uses:`) and adding them all to build-docker's `needs:`.
#
# TODO: add a frontend CI job — npm ci → npm run build → npm run test — so a broken
#       frontend is caught before images are pushed.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # 1. BUILD & TEST
  #    Compiles everything and runs all tests.
  #    Postgres + Kafka service containers are
  #    available on localhost for integration tests.
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test (all services)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # TODO: replace single shared testdb with per-service databases (profiles_test,
      #       matches_test, etc.) to prevent Flyway migrations from different services
      #       conflicting when tests run concurrently on the same Postgres instance.
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: sportlink
          POSTGRES_PASSWORD: sportlink
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
          - 9093:9093
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          # Use 127.0.0.1 instead of localhost — avoids IPv6/hostname resolution
          # issues inside GitHub Actions service containers.
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:9093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        options: >-
          --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # gradle/actions/setup-gradle handles JVM toolchain, Gradle home caching,
      # and makes gradlew executable — no need for setup-java separately.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Build (skip tests)
        run: ./gradlew build -x test --no-daemon
        timeout-minutes: 15

      - name: Run all tests
        run: ./gradlew test --no-daemon
        timeout-minutes: 20

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/'
          retention-days: 7

  # ─────────────────────────────────────────────
  # 2. CODE QUALITY
  #    Runs in parallel with build-and-test.
  #    Remove the `continue-on-error` lines once
  #    ktlint/detekt are configured in build.gradle.kts.
  # ─────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Ktlint
        run: ./gradlew ktlintCheck --no-daemon
        continue-on-error: true  # TODO: remove after configuration

      - name: Detekt
        run: ./gradlew detekt --no-daemon
        continue-on-error: true  # TODO: remove after configuration

  # ─────────────────────────────────────────────
  # 3. BUILD & PUSH DOCKER IMAGES
  #    Runs only on pushes to main (not on PRs).
  #    Waits for build-and-test to pass.
  #    Runs 7 image builds in parallel via matrix.
  #    Images are pushed to GitHub Container Registry.
  # ─────────────────────────────────────────────
  build-docker:
    name: Docker – ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [build-and-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false   # one failing service doesn't cancel the others
      matrix:
        service:
          - gateway-service
          - profile-service
          - matches-service
          - rating-service
          - sports-places-service
          - messaging-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces tags:
      #   ghcr.io/<owner>/<repo>/<service>:<short-sha>   (always)
      #   ghcr.io/<owner>/<repo>/<service>:main          (on branch push)
      #   ghcr.io/<owner>/<repo>/<service>:<semver>      (on git tag push)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64
          # TODO: add linux/arm64 once ARM runner support is confirmed

  # ─────────────────────────────────────────────
  # 4. DEPLOY — STAGING
  #    Runs after all Docker images are pushed.
  #    Requires "staging" environment to be
  #    configured in GitHub → Settings → Environments.
  #    Add protection rules there for required reviewers.
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.sportlink.ru

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Replace the block below with your actual deploy command, e.g.:
      #   SSH + docker compose pull && docker compose up -d
      #   kubectl set image deployment/...
      #   Helm upgrade ...
      - name: Deploy
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "TODO: deploy image tag ${IMAGE_TAG} to staging"
          # Example SSH deploy:
          # ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_HOST }} \
          #   "IMAGE_TAG=${IMAGE_TAG} docker compose -f /opt/sportlink/docker-compose.yml pull && \
          #    docker compose -f /opt/sportlink/docker-compose.yml up -d"

      - name: Health check
        run: |
          echo "TODO: uncomment after staging URL is live"
          # curl --retry 5 --retry-delay 5 -f https://staging.sportlink.ru/actuator/health

      # TODO: add failure notification (Slack / email) so broken deploys are reported
      #       automatically — use `if: failure()` with actions/slack-send or similar.

  # ─────────────────────────────────────────────
  # 5. DEPLOY — PRODUCTION
  #    Runs after staging deploy succeeds.
  #    Requires "production" environment configured
  #    with required reviewers — GitHub will pause
  #    here and wait for a human to approve.
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://sportlink.ru

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "TODO: deploy image tag ${IMAGE_TAG} to production"
          # ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_HOST }} \
          #   "IMAGE_TAG=${IMAGE_TAG} docker compose -f /opt/sportlink/docker-compose.prod.yml pull && \
          #    docker compose -f /opt/sportlink/docker-compose.prod.yml up -d"

      - name: Health check
        run: |
          echo "TODO: uncomment after production URL is live"
          # curl --retry 5 --retry-delay 5 -f https://sportlink.ru/actuator/health
