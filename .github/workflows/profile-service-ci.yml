name: Profile Service CI

on:
  push:
    paths:
      - 'services/profile-service/**'
      - 'build-logic/**'
      - 'common/**'
  pull_request:
    paths:
      - 'services/profile-service/**'
      - 'build-logic/**'
      - 'common/**'

jobs:
  ci:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: profile-service
      needs-postgres: true
      needs-kafka: false
      test-db-name: profiles_test
