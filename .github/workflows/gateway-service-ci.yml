name: Gateway Service CI

on:
  push:
    paths:
      - 'services/gateway-service/**'
  pull_request:
    paths:
      - 'services/gateway-service/**'

jobs:
  build:
    name: Build & Test Gateway Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Gateway Service
        run: ./gradlew :services:gateway-service:build -x test --no-daemon

      - name: Run Gateway Service tests
        run: ./gradlew :services:gateway-service:test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-service-test-results
          path: 'services/gateway-service/build/test-results/'

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/gateway-service/Dockerfile
          push: false
          tags: gateway-service:${{ github.sha }}
