name: Gateway Service CI

on:
  push:
    paths:
      - 'services/gateway-service/**'
      - 'build-logic/**'
      - 'common/**'
  pull_request:
    paths:
      - 'services/gateway-service/**'
      - 'build-logic/**'
      - 'common/**'

jobs:
  ci:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: gateway-service
      needs-postgres: false
      needs-kafka: false
