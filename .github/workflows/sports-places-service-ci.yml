name: Sports Places Service CI
# TODO: once ci-cd.yml is refactored to call _service-ci.yml per service, this file
#       becomes redundant for pushes to main — keep it only for PR fast-feedback
#       and add a branch filter (branches-ignore: [main]) to avoid double runs.

on:
  push:
    paths:
      - 'services/sports-places-service/**'
      - 'build-logic/**'
      - 'common/**'
  pull_request:
    paths:
      - 'services/sports-places-service/**'
      - 'build-logic/**'
      - 'common/**'

jobs:
  ci:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: sports-places-service
      needs-postgres: true
      needs-kafka: false
      test-db-name: places_test
