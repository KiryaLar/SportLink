name: Matches Service CI

on:
  push:
    paths:
      - 'services/matches-service/**'
      - 'build-logic/**'
      - 'common/**'
  pull_request:
    paths:
      - 'services/matches-service/**'
      - 'build-logic/**'
      - 'common/**'

jobs:
  ci:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: matches-service
      needs-postgres: true
      needs-kafka: true
      test-db-name: matches_test
