name: Notification Service CI

on:
  push:
    paths:
      - 'services/notification-service/**'
      - 'build-logic/**'
      - 'common/**'
  pull_request:
    paths:
      - 'services/notification-service/**'
      - 'build-logic/**'
      - 'common/**'

jobs:
  ci:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: notification-service
      needs-postgres: true
      needs-kafka: true
      test-db-name: notifications_test
