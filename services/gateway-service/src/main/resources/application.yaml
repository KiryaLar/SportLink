server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: gateway-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8443/realms/sportlink
          jwk-set-uri: http://localhost:8443/realms/sportlink/protocol/openid-connect/certs

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - AddRequestHeader=X-Gateway, gateway-service
            - StripPrefix=2

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost:*"
                  - "http://127.0.0.1:*"
                  - "https://localhost:*"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers: "*"
                allow-credentials: true
                maxAge: 3600

          routes:
            # Auth endpoints - локальные в Gateway (без аутентификации)
            - id: auth-endpoints
              uri: forward:/
              predicates:
                - Path=/api/v1/auth/**

            # Admin routes (должны быть перед обычными routes)
            - id: admin-profile
              uri: ${PROFILE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/admin/**

            - id: admin-matches
              uri: ${MATCHES_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/admin/matches/**

            # Profile Service
            - id: profile-service
              uri: ${PROFILE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/profiles/**

            # Complaints (в Profile Service)
            - id: complaints
              uri: ${PROFILE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/complaints/**

            # Matches Service
            - id: matches-service
              uri: ${MATCHES_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/matches/**

            # Rating Service
            - id: rating-service
              uri: ${RATING_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/v1/ratings/**

            # Sports Places Service
            - id: sports-places-service
              uri: ${SPORTS_PLACES_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/v1/sports-places/**

            # Messaging Service
            - id: messaging-service
              uri: ${MESSAGING_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/v1/chats/**

            # Notification Service
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
              predicates:
                - Path=/api/v1/notifications/**

logging:
  level:
    ru.larkin.gatewayservice: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
  pattern:
    level: "%5p [traceId=%X{traceId} spanId=%X{spanId}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs
  servers:
    - url: /api/v1
      description: API v1

# Keycloak конфигурация
keycloak:
  admin-server-url: http://localhost:8443
  realm: sportlink
  client-id: gateway-service
  client-secret: ${KEYCLOAK_CLIENT_SECRET:SUPER_SECRET_KEY}

