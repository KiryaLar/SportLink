server:
  port: ${MESSAGING_SERVICE_PORT:8085}

spring:
  application:
    name: messaging-service

  datasource:
    url: jdbc:postgresql://localhost:5433/sportlink_messages
    username: sportlink
    password: sportlink
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8443/realms/sportlink
          jwk-set-uri: http://localhost:8443/realms/sportlink/protocol/openid-connect/certs

logging:
  level:
    ru.larkin.messagingservice: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
